<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chronicle — Wall Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500&family=Syne:wght@400;500;600;700;800&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════ */
:root{
  --bg:#faf7f2;
  --paper:#ffffff;
  --paper2:#f5f1ea;
  --paper3:#ece7de;
  --ink:#1c1a17;
  --ink2:#3d3a35;
  --ink3:#7a756c;
  --ink4:#b0a99e;
  --accent:#c8400a;
  --accent2:#e85a1a;
  --accent-gold:#d4991a;
  --accent-gold2:#f0b830;
  --accent-pale:rgba(200,64,10,0.08);
  --accent-border:rgba(200,64,10,0.28);
  --range-fill:rgba(200,64,10,0.07);
  --range-border:rgba(200,64,10,0.18);
  --sat:#2563c8;
  --sun:#c82525;
  --holiday:#b01818;
  --green:#1a8a4a;
  --shadow-sm:0 2px 8px rgba(28,26,23,0.06);
  --shadow:0 8px 32px rgba(28,26,23,0.1),0 2px 8px rgba(28,26,23,0.06);
  --shadow-lg:0 24px 80px rgba(28,26,23,0.16),0 8px 24px rgba(28,26,23,0.08);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --hero-w:320px;
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"]{
  --bg:#111009;
  --paper:#1c1a15;
  --paper2:#232118;
  --paper3:#2c2920;
  --ink:#f0ebe0;
  --ink2:#c8c0b0;
  --ink3:#857d6e;
  --ink4:#524e45;
  --accent:#e8642a;
  --accent2:#f07840;
  --accent-gold:#d4991a;
  --accent-gold2:#f0b830;
  --accent-pale:rgba(232,100,42,0.1);
  --accent-border:rgba(232,100,42,0.3);
  --range-fill:rgba(232,100,42,0.09);
  --range-border:rgba(232,100,42,0.2);
  --sat:#6a9eee;
  --sun:#ee6a6a;
  --holiday:#ee5555;
  --green:#4ab870;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.3);
  --shadow:0 8px 32px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.2);
  --shadow-lg:0 24px 80px rgba(0,0,0,0.6),0 8px 24px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:2rem 1rem 3rem;
  transition:background var(--transition),color var(--transition);
  color:var(--ink);
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,64,10,0.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
[data-theme="dark"] body::before{
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,100,42,0.06) 0%,transparent 70%);
}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.topbar{
  width:100%;max-width:1140px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;
  position:relative;z-index:2;
  animation:fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
.brand{
  display:flex;align-items:baseline;gap:8px;
}
.brand-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:600;
  color:var(--ink);letter-spacing:-0.01em;
  line-height:1;
}
.brand-name em{color:var(--accent);font-style:italic;}
.brand-tag{
  font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ink4);
}

/* THEME TOGGLE */
.theme-toggle{
  display:flex;align-items:center;gap:8px;
}
.tgl-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);}
.tgl-track{
  width:48px;height:26px;
  background:var(--paper3);
  border:1.5px solid var(--ink4);
  border-radius:999px;
  cursor:pointer;
  position:relative;
  transition:background var(--transition),border-color var(--transition);
  flex-shrink:0;
}
[data-theme="dark"] .tgl-track{
  background:var(--accent);
  border-color:var(--accent);
}
.tgl-thumb{
  position:absolute;
  top:3px;left:3px;
  width:18px;height:18px;
  background:#fff;
  border-radius:50%;
  transition:transform var(--transition),background var(--transition);
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
}
[data-theme="dark"] .tgl-thumb{transform:translateX(22px)}
.tgl-icons{display:flex;align-items:center;gap:4px;font-size:13px;}

/* ═══════════════════════════════════════════════════
   CARD WRAPPER
═══════════════════════════════════════════════════ */
.cal-outer{
  width:100%;max-width:1140px;
  position:relative;z-index:1;
  animation:riseIn 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s both;
}
@keyframes riseIn{from{opacity:0;transform:translateY(28px) scale(0.985)}to{opacity:1;transform:none}}

/* BINDING STRIP */
.binding{
  background:var(--paper3);
  border:1px solid var(--ink4);
  border-bottom:none;
  border-radius:var(--r12) var(--r12) 0 0;
  height:32px;
  display:flex;align-items:center;justify-content:center;gap:16px;
  position:relative;
  overflow:hidden;
}
.binding::before,.binding::after{
  content:'';position:absolute;
  height:1px;background:var(--ink4);opacity:0.4;
  top:50%;left:0;right:0;
}
.ring{
  width:16px;height:16px;
  border:2px solid var(--ink3);
  border-radius:50%;
  background:var(--bg);
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.15),0 1px 0 rgba(255,255,255,0.3);
  position:relative;z-index:1;
  flex-shrink:0;
}

/* MAIN CARD */
.cal-card{
  background:var(--paper);
  border:1px solid var(--ink4);
  border-top:none;
  border-radius:0 0 var(--r20) var(--r20);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ═══════════════════════════════════════════════════
   BODY LAYOUT
═══════════════════════════════════════════════════ */
.cal-body{
  display:grid;
  grid-template-columns:var(--hero-w) 1fr;
  min-height:640px;
}

/* ═══════════════════════════════════════════════════
   LEFT — HERO PANEL
═══════════════════════════════════════════════════ */
.hero-panel{
  display:flex;flex-direction:column;
  background:var(--paper2);
  border-right:1px solid var(--ink4);
  position:relative;
  overflow:hidden;
}

/* HERO IMAGE / ILLUSTRATION */
.hero-img-wrap{
  position:relative;
  height:260px;
  overflow:hidden;
  flex-shrink:0;
}
.hero-canvas{
  width:100%;height:100%;
  display:block;
  transition:opacity 0.5s ease;
}
.hero-vignette{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,var(--paper2) 100%);
}
.hero-badge{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:16px 20px 12px;
}
.hero-year{
  font-size:10px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--accent);margin-bottom:2px;
}
.hero-month{
  font-family:'Cormorant Garamond',serif;
  font-size:2.8rem;font-weight:600;line-height:0.92;
  color:var(--ink);letter-spacing:-0.02em;
}
.hero-month em{font-style:italic;color:var(--accent);}

/* SEASON PILL */
.season-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accent-pale);
  border:1px solid var(--accent-border);
  border-radius:999px;
  padding:3px 10px;
  font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--accent);
  margin:0 20px 4px;
}

/* NAV ROW */
.nav-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  border-top:1px solid var(--ink4);
  border-bottom:1px solid var(--ink4);
}
.nav-group{display:flex;gap:4px;}
.nav-btn{
  width:32px;height:32px;
  background:var(--paper);
  border:1px solid var(--ink4);
  color:var(--ink2);
  border-radius:var(--r8);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;
  transition:all 0.15s;
  font-family:inherit;
}
.nav-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.05);}
.today-btn{
  font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink3);
  background:var(--paper3);
  border:1px solid var(--ink4);
  border-radius:999px;
  padding:5px 12px;
  cursor:pointer;
  transition:all 0.15s;
  font-family:inherit;
}
.today-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* RANGE DISPLAY */
.range-display{
  padding:14px 16px;
  border-bottom:1px solid var(--ink4);
}
.rd-lbl{
  font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ink4);margin-bottom:10px;
}
.rd-pair{
  display:grid;grid-template-columns:1fr 24px 1fr;
  align-items:center;gap:4px;margin-bottom:10px;
}
.rd-box{
  background:var(--paper);
  border:1.5px solid var(--ink4);
  border-radius:var(--r8);
  padding:8px 10px;text-align:center;
  transition:border-color 0.2s,background 0.2s;
}
.rd-box.lit{border-color:var(--accent);background:var(--accent-pale);}
.rd-lbl2{font-size:8px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink4);display:block;margin-bottom:2px;}
.rd-val{
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;font-weight:600;
  color:var(--ink);line-height:1.1;
}
.rd-wd{font-size:9px;color:var(--ink3);margin-top:1px;}
.rd-sep{text-align:center;color:var(--ink4);font-size:16px;line-height:1;}
.dur-badge{
  display:none;align-items:center;gap:6px;
  font-size:11px;font-weight:600;color:var(--accent);
}
.dur-badge.on{display:flex}
.dur-pip{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.dur-nights{font-size:10px;color:var(--ink3);margin-left:2px;}

/* QUOTE */
.quote-block{
  flex:1;
  padding:14px 16px;
  display:flex;flex-direction:column;justify-content:center;
  border-bottom:1px solid var(--ink4);
  position:relative;overflow:hidden;
  cursor:pointer;
  min-height:100px;
}
.quote-block::before{
  content:'\201C';
  position:absolute;top:-8px;left:12px;
  font-family:'Cormorant Garamond',serif;
  font-size:80px;font-weight:300;line-height:1;
  color:var(--accent);opacity:0.12;
  pointer-events:none;
  transition:opacity 0.3s;
}
.quote-block:hover::before{opacity:0.22;}
.q-text{
  font-family:'Kalam',cursive;
  font-size:13px;line-height:1.6;
  color:var(--ink2);
  position:relative;z-index:1;
  transition:opacity 0.3s;
}
.q-author{
  font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--accent);margin-top:7px;
  position:relative;z-index:1;
}
.q-hint{
  font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink4);margin-top:8px;opacity:0.7;
}
.q-dots{display:flex;gap:4px;margin-top:8px;}
.qdot{width:5px;height:5px;border-radius:50%;background:var(--ink4);cursor:pointer;transition:background 0.2s,transform 0.2s;}
.qdot.on{background:var(--accent);transform:scale(1.3);}

/* WEATHER WIDGET */
.weather-strip{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:var(--paper3);
  border-bottom:1px solid var(--ink4);
}
.wx-group{display:flex;align-items:center;gap:6px;}
.wx-icon{font-size:20px;line-height:1;}
.wx-info{display:flex;flex-direction:column;}
.wx-temp{font-size:13px;font-weight:700;color:var(--ink);}
.wx-desc{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);}
.wx-loc{font-size:9px;color:var(--ink4);display:flex;align-items:center;gap:3px;}

/* CLEAR */
.clear-row{
  padding:10px 16px;
  display:flex;gap:6px;
}
.clear-btn{
  flex:1;
  background:transparent;
  border:1px solid var(--ink4);
  color:var(--ink3);
  border-radius:var(--r8);
  padding:7px;
  font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.clear-btn:hover{background:#fee;border-color:#e55;color:#c33;}
.export-btn{
  background:var(--accent);
  border:1px solid var(--accent);
  color:#fff;
  border-radius:var(--r8);
  padding:7px 10px;
  font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
}
.export-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,64,10,0.3);}

/* ═══════════════════════════════════════════════════
   RIGHT PANEL
═══════════════════════════════════════════════════ */
.right-panel{
  display:flex;flex-direction:column;
}

/* MONTH JUMP BAR */
.month-bar{
  display:flex;
  border-bottom:1px solid var(--ink4);
  background:var(--paper2);
  overflow-x:auto;
  scrollbar-width:none;
}
.month-bar::-webkit-scrollbar{display:none}
.mb-item{
  flex:1;min-width:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px;
  cursor:pointer;
  position:relative;
  transition:background 0.15s;
  border-right:1px solid var(--ink4);
  font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--ink3);
  gap:3px;
}
.mb-item:last-child{border-right:none}
.mb-item:hover{background:var(--accent-pale);color:var(--accent);}
.mb-item.active{
  background:var(--accent);
  color:#fff;
}
.mb-item.active .mb-bar{background:rgba(255,255,255,0.4);}
.mb-bar{
  width:24px;height:2px;border-radius:1px;
  background:var(--ink4);
  transition:background 0.2s;
}
.mb-item.has-events .mb-bar{background:var(--accent-gold);}
.mb-item.active.has-events .mb-bar{background:#fff;}
.mb-dot{width:4px;height:4px;border-radius:50%;background:var(--accent-gold);display:none;}
.mb-item.has-events .mb-dot{display:block;}

/* GRID SECTION */
.grid-section{
  padding:20px 24px;
  flex:1;
  display:flex;flex-direction:column;
  gap:8px;
}

/* WEEK HEADERS */
.wday-row{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;margin-bottom:2px;
}
.wday{
  text-align:center;
  font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--ink4);padding:4px 0;
}
.wday.sat{color:var(--sat);}
.wday.sun{color:var(--sun);}

/* DAY CELLS */
.days-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;
  flex:1;
}
.dc{
  aspect-ratio:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:var(--r8);
  cursor:pointer;
  position:relative;
  transition:background 0.12s,color 0.12s,transform 0.12s,box-shadow 0.12s;
  user-select:none;
  border:1.5px solid transparent;
  font-size:13px;font-weight:500;
  color:var(--ink);
  overflow:hidden;
}
.dc:hover:not(.oom){
  background:var(--accent-pale);
  border-color:var(--accent-border);
  transform:scale(1.06);
  z-index:2;
}
.dc.oom{color:var(--ink4);opacity:0.35;cursor:default;font-weight:300;}
.dc.sat-dc{color:var(--sat);}
.dc.sun-dc{color:var(--sun);}
.dc.today-dc{
  background:var(--paper3);
  border-color:var(--ink2) !important;
  font-weight:800;
  color:var(--ink);
}
.dc.today-dc::after{
  content:'';
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);
}
/* Range states */
.dc.rs{
  background:var(--accent) !important;
  color:#fff !important;
  border-color:var(--accent) !important;
  font-weight:800;
  border-radius:var(--r12) 0 0 var(--r12);
  box-shadow:0 4px 14px rgba(200,64,10,0.35);
  animation:popCell 0.28s cubic-bezier(0.34,1.56,0.64,1);
  z-index:3;transform:scale(1.08);
}
.dc.re{
  background:var(--accent-gold) !important;
  color:#fff !important;
  border-color:var(--accent-gold) !important;
  font-weight:800;
  border-radius:0 var(--r12) var(--r12) 0;
  box-shadow:0 4px 14px rgba(212,153,26,0.35);
  animation:popCell 0.28s cubic-bezier(0.34,1.56,0.64,1);
  z-index:3;transform:scale(1.08);
}
.dc.rs.re{border-radius:var(--r12)!important;}
.dc.ir{
  background:var(--range-fill);
  border-color:var(--range-border);
  border-radius:0;color:var(--ink);
}
.dc.ir:first-child,.dc.ir.week-start{border-radius:var(--r8) 0 0 var(--r8);}
.dc.ir.week-end{border-radius:0 var(--r8) var(--r8) 0;}
.dc.has-note::before{
  content:'';position:absolute;top:3px;right:4px;
  width:5px;height:5px;border-radius:50%;
  background:var(--accent-gold);
}
.dc.holiday-dc{
  color:var(--holiday) !important;
  font-weight:700;
}
.dc.holiday-dc:not(.rs):not(.re){border-color:rgba(176,24,24,0.18);}
.hol-tooltip{
  position:absolute;
  bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);
  border-radius:var(--r8);
  padding:5px 9px;
  font-size:10px;font-weight:600;
  white-space:nowrap;
  opacity:0;pointer-events:none;z-index:20;
  transition:opacity 0.2s;
  box-shadow:var(--shadow);
}
.hol-tooltip::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--ink);
}
.dc:hover .hol-tooltip{opacity:1;}
.dc-num{position:relative;z-index:1;line-height:1;}
.hol-pip{
  width:3px;height:3px;border-radius:50%;
  background:var(--holiday);
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
}
@keyframes popCell{
  from{transform:scale(0.6);opacity:0.3}
  to{transform:scale(1.08);opacity:1}
}

/* WEEK NUMBERS */
.week-col{
  display:flex;flex-direction:column;justify-content:space-around;
  padding-right:6px;
  border-right:1px solid var(--ink4);
  margin-right:4px;
}
.wnum{
  font-size:9px;font-weight:600;color:var(--ink4);
  line-height:1;height:36px;display:flex;align-items:center;justify-content:center;
}
.grid-with-weeks{display:flex;}
.grid-right{flex:1;}

/* NOTES SECTION */
.notes-section{
  padding:16px 24px;
  border-top:1px solid var(--ink4);
  background:var(--paper2);
  display:flex;flex-direction:column;gap:10px;
}
.notes-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:6px;
}
.notes-lbl{
  font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink4);
}
.notes-ctx{

/* ── UTILS ──────────────────────────────────────── */
function dk(y,m,d){return `${y}-${p2(m+1)}-${p2(d)}`;}
function p2(n){return String(n).padStart(2,'0');}
function sameD(a,b){return a&&b&&dk(a.getFullYear(),a.getMonth(),a.getDate())===dk(b.getFullYear(),b.getMonth(),b.getDate());}
function todayKey(){return dk(NOW.getFullYear(),NOW.getMonth(),NOW.getDate());}
function fmt(d){return d?`${p2(d.getDate())} ${MONTHS_S[d.getMonth()]}`:'—';}
function holKey(m,d){return `${p2(m+1)}-${p2(d)}`;}
function inRange(d){return rS&&rE&&d>rS&&d<rE;}
function getSeason(m){return SEASONS.find(s=>s.months.includes(m));}
function weekNum(d){
  const j=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dw=j.getUTCDay()||7;
  j.setUTCDate(j.getUTCDate()+4-dw);
  const yearStart=new Date(Date.UTC(j.getUTCFullYear(),0,1));
  return Math.ceil((((j-yearStart)/86400000)+1)/7);

/* ── RENDER MONTH BAR ─────────────────────────────── */
function renderMonthBar(){
  const bar=document.getElementById('month-bar');
  bar.innerHTML='';
  MONTHS_S.forEach((ms,i)=>{
    const hasNote=Object.keys(notes).some(k=>k.startsWith(`${Y}-${p2(i+1)}`));
    const div=document.createElement('div');
    div.className='mb-item'+(i===M?' active':'')+(hasNote?' has-events':'');
    div.innerHTML=`${ms}<div class="mb-bar"></div>${hasNote?'<div class="mb-dot"></div>':''}`;
    div.title=MONTHS[i]+' '+Y;
    div.addEventListener('click',()=>{M=i;render();});

  });
}

/* ── RENDER LEFT PANEL ───────────────────────────── */
function renderLeft(){
  const rs=document.getElementById('rd-start'),re=document.getElementById('rd-end');
  document.getElementById('rd-sv').textContent=fmt(rS);
  document.getElementById('rd-sw').textContent=rS?WDAYS_FULL[rS.getDay()]:'';
  document.getElementById('rd-ev').textContent=fmt(rE);
  document.getElementById('rd-ew').textContent=rE?WDAYS_FULL[rE.getDay()]:'';
  rs.classList.toggle('lit',!!rS);
  re.classList.toggle('lit',!!rE);
  const db=document.getElementById('dur-badge');
  if(rS&&rE){
    const days=Math.round((rE-rS)/86400000)+1;
    const nights=days-1;
    document.getElementById('dur-txt').textContent=`${days} day${days!==1?'s':''}`;
    document.getElementById('dur-nights').textContent=`• ${nights} night${nights!==1?'s':''}`;
    db.classList.add('on');
  } else {
    db.classList.remove('on');
  }
  const ctx=document.getElementById('notes-ctx');
  if(rS&&rE) ctx.textContent=`${fmt(rS)} → ${fmt(rE)}`;
  else if(rS) ctx.textContent=fmt(rS);
  else ctx.textContent='Monthly';
}

/* ── RENDER GRID ─────────────────────────────────── */
function renderGrid(){
  const grid=document.getElementById('days-grid');
  const weekCol=document.getElementById('week-col');
  grid.innerHTML='';weekCol.innerHTML='';

  const first=new Date(Y,M,1);
  const last=new Date(Y,M+1,0);
  let dow=first.getDay();
  dow=dow===0?6:dow-1;

  const tKey=todayKey();
  const cells=[];

  // Prev month blanks
  const prevLast=new Date(Y,M,0);
  for(let i=dow-1;i>=0;i--) cells.push({d:prevLast.getDate()-i,oom:true,obj:new Date(Y,M-1,prevLast.getDate()-i)});
  for(let d=1;d<=last.getDate();d++) cells.push({d,oom:false,obj:new Date(Y,M,d)});
  const rem=(7-((dow+last.getDate())%7))%7;
  for(let d=1;d<=rem;d++) cells.push({d,oom:true,obj:new Date(Y,M+1,d)});

  // Week numbers
  const weeks=[];
  for(let i=0;i<cells.length;i+=7){
    const wn=weekNum(cells[i].obj);
    weeks.push(wn);
    const wEl=document.createElement('div');
    wEl.className='wnum';wEl.textContent=`W${wn}`;
    weekCol.appendChild(wEl);
  }

  cells.forEach((cell,idx)=>{
    const c=document.createElement('div');
    const{d,oom,obj}=cell;
    const dKey=dk(obj.getFullYear(),obj.getMonth(),obj.getDate());
    const wdow=obj.getDay();
    const isRS=rS&&sameD(obj,rS);
    const isRE=rE&&sameD(obj,rE);
    const isIR=!oom&&inRange(obj);
    const isToday=dKey===tKey;
    const isSat=wdow===6,isSun=wdow===0;
    const hk=holKey(obj.getMonth(),d);
    const isHol=!oom&&HOLIDAYS[hk];
    const hasNote=!oom&&(notes[dKey]||Object.keys(notes).some(k=>k.includes(dKey)));
    const weekPos=idx%7;

    let cls='dc';
    if(oom)cls+=' oom';
    else{
      if(isSat)cls+=' sat-dc';
      if(isSun)cls+=' sun-dc';
      if(isToday)cls+=' today-dc';
      if(isRS)cls+=' rs';
      if(isRE)cls+=' re';
      if(isIR){cls+=' ir';if(weekPos===0)cls+=' week-start';if(weekPos===6)cls+=' week-end';}
      if(hasNote)cls+=' has-note';
      if(isHol)cls+=' holiday-dc';
    }
    c.className=cls;

    // Number
    const numSpan=document.createElement('span');
    numSpan.className='dc-num';numSpan.textContent=d;
    c.appendChild(numSpan);

    // Holiday pip & tooltip
    if(isHol){
      const pip=document.createElement('div');pip.className='hol-pip';c.appendChild(pip);
      const tip=document.createElement('div');tip.className='hol-tooltip';
      tip.textContent=`${HOLIDAYS[hk].e} ${HOLIDAYS[hk].n}`;
      c.appendChild(tip);
    }

    if(!oom){
      c.dataset.ts=obj.getTime();
      c.addEventListener('click',onDayClick);
    }
    grid.appendChild(c);
  });
}

/* ── PROGRESS BAR ───────────────────────────────── */
function renderProgress(){
  const start=new Date(Y,0,1);
  const end=new Date(Y+1,0,1);
  const pct=Math.round(((NOW-start)/(end-start))*100);
  const daysLeft=Math.ceil((end-NOW)/86400000);
  document.getElementById('prog-fill').style.width=`${pct}%`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('days-left').textContent=daysLeft;
  // Note streak
  const noteCount=Object.keys(notes).filter(k=>k.trim()).length;
  document.getElementById('streak-txt').textContent=`${noteCount} note${noteCount!==1?'s':''}`;
}

/* ── RENDER NOTES ───────────────────────────────── */
function noteKey(){
  if(rS&&rE) return `${dk(rS.getFullYear(),rS.getMonth(),rS.getDate())}_${dk(rE.getFullYear(),rE.getMonth(),rE.getDate())}`;
  if(rS) return dk(rS.getFullYear(),rS.getMonth(),rS.getDate());
  return `${Y}-${p2(M+1)}`;
}
function renderNotes(){
  document.getElementById('notes-ta').value=notes[noteKey()]||'';
  const row=document.getElementById('chips-row');row.innerHTML='';
  Object.entries(notes).filter(([,v])=>v&&v.trim()).slice(-10).reverse().forEach(([k,txt])=>{
    let lbl;
    if(k.includes('_')){lbl=k.split('_').map(p=>{const[y,m,d]=p.split('-');return`${d} ${MONTHS_S[+m-1]}`;}).join(' → ');}
    else if(k.split('-').length===3){const[,m,d]=k.split('-');lbl=`${d} ${MONTHS_S[+m-1]}`;}
    else{const[y,m]=k.split('-');lbl=`${MONTHS_S[+m-1]} ${y}`;}
    const chip=document.createElement('div');chip.className='chip';
    chip.innerHTML=`<div class="chip-dot"></div><span class="chip-date">${lbl}</span><span class="chip-text" title="${txt}">${txt}</span><button class="chip-del" data-key="${k}" aria-label="Delete">×</button>`;
    row.appendChild(chip);
  });
  row.querySelectorAll('.chip-del').forEach(b=>b.addEventListener('click',()=>{delete notes[b.dataset.key];render();}));
}

/* ── RENDER QUOTE ───────────────────────────────── */
function renderQuote(){
  const q=QUOTES[qIdx];
  document.getElementById('q-text').textContent=q.t;
  document.getElementById('q-author').textContent='— '+q.a;
  const dots=document.getElementById('q-dots');dots.innerHTML='';
  QUOTES.forEach((_,i)=>{
    const d=document.createElement('div');d.className='qdot'+(i===qIdx?' on':'');
    d.addEventListener('click',e=>{e.stopPropagation();qIdx=i;renderQuote();});
    dots.appendChild(d);
  });
}

/* ── RENDER YEAR OVERVIEW ───────────────────────── */
function renderYearOverview(){
  const ov=document.getElementById('year-overview');
  ov.innerHTML='';
  MONTHS.forEach((mn,mi)=>{
    const mc=document.createElement('div');
    mc.className='mini-cal'+(mi===M?' active-mc':'');
    const first=new Date(Y,mi,1),last=new Date(Y,mi+1,0);
    let dow=first.getDay();dow=dow===0?6:dow-1;
    let cells='';
    for(let i=0;i<dow;i++) cells+=`<div class="mc-cell"></div>`;
    for(let d=1;d<=last.getDate();d++){
      const dObj=new Date(Y,mi,d);
      const dKey=dk(Y,mi,d);
      const isT=dKey===todayKey();
      const isRS2=rS&&sameD(dObj,rS);
      const isRE2=rE&&sameD(dObj,rE);
      const isIR2=rS&&rE&&dObj>rS&&dObj<rE;
      const wdow=dObj.getDay();
      let cc='mc-cell';
      if(isT)cc+=' mc-today';
      else if(isRS2)cc+=' mc-rs';
      else if(isRE2)cc+=' mc-re';
      else if(isIR2)cc+=' mc-ir';
      else if(wdow===6)cc+=' mc-sat';
      else if(wdow===0)cc+=' mc-sun';
      cells+=`<div class="${cc}">${isT||isRS2||isRE2?d:''}</div>`;
    }
    mc.innerHTML=`<div class="mc-head">${MONTHS_S[mi]}</div><div class="mc-grid">${cells}</div>`;
    mc.addEventListener('click',()=>{M=mi;render();});
    ov.appendChild(mc);
  });
}

/* ── MAIN RENDER ─────────────────────────────────── */
function render(){
  renderHero();
  renderMonthBar();
  renderLeft();
  renderGrid();
  renderNotes();
  renderProgress();
  renderQuote();
  if(showYearView) renderYearOverview();
}

/* ── TOAST ───────────────────────────────────────── */
let tTimer;
function toast(msg,cls=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(cls||'');
  clearTimeout(tTimer);tTimer=setTimeout(()=>t.className='toast',2500);
}

/* ── DAY CLICK ───────────────────────────────────── */
function onDayClick(e){
  const d=new Date(parseInt(e.currentTarget.dataset.ts));
  if(!rS||(rS&&rE)){rS=d;rE=null;picking=true;}
  else if(picking){
    if(sameD(d,rS)){rE=null;picking=false;}
    else if(d<rS){rE=rS;rS=d;picking=false;}
    else{rE=d;picking=false;}
  }
  render();
  if(rE) toast(`${Math.round((rE-rS)/86400000)+1} days selected`,'gold');
}

/* ── EVENTS ──────────────────────────────────────── */
document.getElementById('prev-btn').addEventListener('click',()=>{M--;if(M<0){M=11;Y--;}render();});
document.getElementById('next-btn').addEventListener('click',()=>{M++;if(M>11){M=0;Y++;}render();});
document.getElementById('today-btn').addEventListener('click',()=>{
  Y=NOW.getFullYear();M=NOW.getMonth();
  rS=new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate());rE=null;picking=false;
  render();toast('Jumped to today ✓','warm');
});
document.getElementById('clear-btn').addEventListener('click',()=>{
  rS=null;rE=null;picking=false;render();toast('Selection cleared');
});

// Theme toggle
function setTheme(dark){
  isDark=dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('tgl-lbl').textContent=dark?'Dark':'Light';
  document.getElementById('tgl-track').setAttribute('aria-checked',dark);
  document.querySelector('.tgl-thumb').textContent=dark?'🌙':'☀️';
  toast(dark?'Dark mode on':'Light mode on');
}
document.getElementById('tgl-track').addEventListener('click',()=>setTheme(!isDark));
document.getElementById('tgl-track').addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();setTheme(!isDark);}});

// Quote
document.getElementById('quote-block').addEventListener('click',()=>{qIdx=(qIdx+1)%QUOTES.length;renderQuote();toast('New quote ✨','gold');});

// Save note
document.getElementById('save-btn').addEventListener('click',()=>{
  const txt=document.getElementById('notes-ta').value.trim();
  const k=noteKey();
  if(txt){notes[k]=txt;toast('Note saved ✓','warm');}
  else{delete notes[k];toast('Note cleared');}
  render();
});
document.getElementById('notes-ta').addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){document.getElementById('save-btn').click();}
});

// Year overview
document.getElementById('overview-btn').addEventListener('click',()=>{
  showYearView=!showYearView;
  const ov=document.getElementById('year-overview');
  ov.classList.toggle('show',showYearView);
  if(showYearView)renderYearOverview();
  toast(showYearView?'Year view on':'Year view off');
});

// Export
document.getElementById('export-btn').addEventListener('click',()=>{
  const lines=[`Chronicle Calendar Export`,`Month: ${MONTHS[M]} ${Y}`,``];
  if(rS)lines.push(`Range: ${fmt(rS)}${rE?' → '+fmt(rE):''}`);
  const relevantNotes=Object.entries(notes).filter(([,v])=>v);
  if(relevantNotes.length){lines.push(`\nNotes:`);relevantNotes.forEach(([k,v])=>lines.push(`  ${k}: ${v}`));}
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`chronicle-${Y}-${p2(M+1)}.txt`;a.click();
  toast('Exported! ↓','warm');
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA')return;
  if((e.metaKey||e.ctrlKey)&&e.key==='ArrowLeft'){document.getElementById('prev-btn').click();}
  if((e.metaKey||e.ctrlKey)&&e.key==='ArrowRight'){document.getElementById('next-btn').click();}
  if(e.key==='Escape'&&(rS||rE)){document.getElementById('clear-btn').click();}
  if(e.key==='t'||e.key==='T'){document.getElementById('today-btn').click();}
});

/* ── INIT ────────────────────────────────────────── */
(function init(){
  qIdx=M%QUOTES.length;
  renderBinding();
  render();
})();
</script>
